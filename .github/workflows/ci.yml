name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: engine

      - name: Clippy
        working-directory: engine
        run: cargo clippy --lib --tests --benches -- -D warnings

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: engine

      - name: Unit tests
        working-directory: engine
        run: cargo test --lib

      - name: Core solver tests (92 tests)
        working-directory: engine
        run: cargo test --test core

      - name: Property / differential fuzz tests (90 tests)
        working-directory: engine
        run: cargo test --test property

      - name: Integration tests
        working-directory: engine
        run: cargo test --test integration

      - name: Acceptance gates (multi-feature models)
        working-directory: engine
        run: cargo test --test validation acceptance_ -- --test-threads=1
        timeout-minutes: 2

      - name: Validation tests (includes benchmark gates)
        working-directory: engine
        run: cargo test --test validation
        timeout-minutes: 10

      - name: Benchmarks compile
        working-directory: engine
        run: cargo bench --no-run

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        working-directory: web
        run: npm ci

      - name: Build
        working-directory: web
        run: npm run build
