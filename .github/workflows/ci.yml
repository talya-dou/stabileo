name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: engine

      - name: Clippy
        working-directory: engine
        run: cargo clippy --lib --tests --benches -- -D warnings

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: engine

      - name: Install mold linker
        run: sudo apt-get install -y mold

      - uses: taiki-e/install-action@nextest

      - name: Shell benchmarks gate
        working-directory: engine
        run: cargo nextest run --profile ci -E 'test(/benchmark_shell/) + test(/benchmark_beam_shell/)'

      - name: Shell acceptance gate
        working-directory: engine
        run: cargo nextest run --profile ci -E 'test(/acceptance_.*shell/) + test(/acceptance_.*diaphragm/)'

      - name: Constraint benchmarks gate
        working-directory: engine
        run: cargo nextest run --profile ci -E 'test(/benchmark_.*constraint/)'

      - name: Run all tests
        working-directory: engine
        run: cargo nextest run --profile ci
        timeout-minutes: 10

      - name: Benchmarks compile
        working-directory: engine
        run: cargo bench --no-run

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        working-directory: web
        run: npm ci

      - name: Build
        working-directory: web
        run: npm run build
